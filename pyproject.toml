[tool.poetry]
name = "verbilo"
version = "1.5.0"
build_date = "2026-03-03"
description = "Translate .docx, .pdf, .xlsx, .xls files while preserving formatting."
authors = ["crt_"]
packages = [{ include = "verbilo", from = "src" }]

[tool.poetry.scripts]
verbilo = "verbilo.cli:main"

[tool.poetry.dependencies]
python = "^3.12.10"
pytablericons = ">=1.0.1"

[tool.poetry.dev-dependencies]
pytest = "^7.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
