name: Build Nuitka Windows executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install Clang
        run: |
          choco install llvm --yes
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka wheel
          pip install -r requirements.txt
  
      # --- THE MAGIC CACHE STEP ---
      - name: Cache Nuitka Build Data
        uses: actions/cache@v4
        with:
          # Windows-specific Nuitka cache path
          path: ${{ github.workspace }}\.nuitka-cache
          key: ${{ runner.os }}-nuitka-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-

      - name: Download models
        run: python scripts/download_models.py fasttext --dest models/lid.176.bin
      
      - name: Create opus-mt placeholder directory
        run: New-Item -ItemType Directory -Force -Path "models\opus-mt"
        shell: pwsh

      - name: Build with Nuitka
        env:
          NUITKA_CACHE_DIR: ${{ github.workspace }}\.nuitka-cache
        run: python scripts/build_nuitka.py --entry gui --output dist/nuitka

      - name: Prepare Release Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "Verbilo-Release"
          
          # Copy only the .dist contents (not .build)
          Copy-Item -Path "dist\nuitka\launch.dist\*" -Destination "Verbilo-Release\" -Recurse
          
          if (Test-Path "README.md") { Copy-Item "README.md" "Verbilo-Release\" }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "Verbilo-Release\" }

          # Generate Checksum
          $hash = (Get-FileHash "Verbilo-Release\verbilo.exe" -Algorithm SHA256).Hash
          "SHA256: $hash  verbilo.exe" | Out-File -FilePath "Verbilo-Release\checksum.txt" -Encoding utf8
          
          Rename-Item "Verbilo-Release" "Verbilo"
          Compress-Archive -Path "Verbilo\" -DestinationPath "verbilo-windows-gui.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: verbilo-windows-gui
          path: verbilo-windows-gui.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: verbilo-windows-gui.zip
          generate_release_notes: true
          body: "Check the attached `checksum.csv` to verify your download."
