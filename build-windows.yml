name: Build Nuitka Windows executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.12'
          cache: 'pip' # Built-in pip caching

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka wheel
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      # --- THE MAGIC CACHE STEP ---
      - name: Cache Nuitka Build Data
        uses: actions/cache@v4
        with:
          # Windows-specific Nuitka cache path
          path: ~\AppData\Local\Nuitka\Nuitka
          key: ${{ runner.os }}-nuitka-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-nuitka-

      - name: Download models
        run: python scripts/download_models.py --dest models/lid.176.bin

      - name: Build with Nuitka
        # Ensure your script uses --low-memory and --lto=no for PyMuPDF
        run: python scripts/build_nuitka.py --entry gui --output dist/nuitka

      - name: Prepare Release Package
        shell: pwsh
        run: |
          # Create a clean staging area
          New-Item -ItemType Directory -Path "Verbilo-Release"
          
          # Copy the Nuitka .dist contents into the root of the staging area
          # Adjust the source path 'dist\nuitka\gui.dist' to match your script's output
          Copy-Item -Path "dist\nuitka\gui.dist\*" -Destination "Verbilo-Release\" -Recurse
          
          # Add User Metadata
          if (Test-Path "README.md") { Copy-Item "README.md" "Verbilo-Release\" }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "Verbilo-Release\" }
          
          # Create the "Shortcut" Launcher (Batch file)
          # This allows the user to double-click a file in the root instead of hunting for the exe
          "@echo off`nstart `"`" `"%~dp0gui.exe`"" | Out-File -FilePath "Verbilo-Release\Launch-Verbilo.bat" -Encoding ascii

          # Generate Checksum
          Set-Location "Verbilo-Release"
          Get-FileHash "gui.exe" -Algorithm SHA256 | Export-Csv -Path "checksum.csv"
          Set-Location ".."

          # Zip everything
          Compress-Archive -Path "Verbilo-Release\*" -DestinationPath "verbilo-windows-gui.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: verbilo-windows-gui
          path: verbilo-windows-gui.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2 # Updated to v2
        with:
          files: verbilo-windows-gui.zip
          generate_release_notes: true
          body: "Check the attached `checksum.csv` to verify your download."